name: Android Release Build

# Builds a signed Android App Bundle (.aab) for Google Play.
# Trigger: push a tag like `android-v1.0.0`, or run manually (workflow_dispatch).
# Requires 4 repo secrets (Settings -> Secrets and variables -> Actions):
#   ANDROID_KEYSTORE_BASE64    base64 of your upload-keystore.jks
#   ANDROID_KEYSTORE_PASSWORD  store password
#   ANDROID_KEY_ALIAS          key alias (e.g. upload)
#   ANDROID_KEY_PASSWORD       key password
# The .aab is published as a workflow artifact to download and upload to Play.

on:
  push:
    tags: ["android-v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Capacitor sync (copy web build into android)
        run: npx cap sync android

      - name: Decode signing keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/upload-keystore.jks

      - name: Build signed AAB
        working-directory: android
        env:
          ANDROID_KEYSTORE_PATH: upload-keystore.jks   # resolved relative to android/app
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew bundleRelease --no-daemon

      - name: Upload .aab artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      - name: Remove keystore from runner
        if: always()
        run: rm -f android/app/upload-keystore.jks
